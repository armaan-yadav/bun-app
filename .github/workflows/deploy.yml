name: Deploy bun-app on VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{secrets.SSH_HOST}}
          user: armaan
          key: ${{secrets.SSH_KEY}}
          script: |
            cd /home/armaan/app
            git pull
            docker compose up -d --build

